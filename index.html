<!DOCTYPE html>
<!-- Linha 1: Declaração do tipo de documento HTML5 -->

<html lang="pt-BR">
<!-- Linha 2: Abre a tag html principal e define o idioma como português brasileiro -->

<head>
    <!-- Linha 3: Abre a seção head (metadados da página) -->

    <meta charset="UTF-8">
    <!-- Linha 4: Define a codificação de caracteres como UTF-8 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Linha 5: Configura a viewport para responsividade em dispositivos móveis -->

    <title>Calculadora de IMC | Avaliação Clínica e Esportiva</title>
    <!-- Linha 6: Define o título que aparece na aba do navegador -->

    <style>
        <!-- Linha 7: Abre a tag style para inserir CSS -->

        * {
            <!-- Linha 8: Seletor universal CSS -->
            margin: 0;
            <!-- Linha 9: Remove margens padrão -->
            padding: 0;
            <!-- Linha 10: Remove preenchimentos padrão -->
            box-sizing: border-box;
            <!-- Linha 11: Define o modelo de caixa -->
        }
        <!-- Linha 12: Fecha o seletor universal -->

        body {
            <!-- Linha 13: Estiliza o elemento body -->
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            <!-- Linha 14: Define a fonte principal -->
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            <!-- Linha 15: Define o fundo com gradiente -->
            color: #e2e8f0;
            <!-- Linha 16: Define a cor do texto -->
            min-height: 100vh;
            <!-- Linha 17: Garante altura mínima da tela -->
            display: flex;
            <!-- Linha 18: Usa flexbox para centralização -->
            align-items: center;
            <!-- Linha 19: Centraliza verticalmente -->
            justify-content: center;
            <!-- Linha 20: Centraliza horizontalmente -->
        }
        <!-- Linha 21: Fecha o estilo do body -->

        .container {
            <!-- Linha 22: Estiliza a classe container -->
            background: #1e2937;
            <!-- Linha 23: Cor de fundo do cartão -->
            width: 100%;
            <!-- Linha 24: Largura 100% com limite máximo -->
            max-width: 620px;
            <!-- Linha 25: Largura máxima do cartão -->
            margin: 20px;
            <!-- Linha 26: Margem externa -->
            padding: 40px 35px;
            <!-- Linha 27: Espaçamento interno -->
            border-radius: 16px;
            <!-- Linha 28: Cantos arredondados -->
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            <!-- Linha 29: Sombra do cartão -->
            border: 1px solid #334155;
            <!-- Linha 30: Borda sutil -->
        }
        <!-- Linha 31: Fecha o estilo do container -->

        h1 {
            <!-- Linha 32: Estiliza o título h1 -->
            text-align: center;
            <!-- Linha 33: Centraliza o texto -->
            font-size: 2.1rem;
            <!-- Linha 34: Tamanho da fonte -->
            margin-bottom: 8px;
            <!-- Linha 35: Margem inferior -->
            color: #60a5fa;
            <!-- Linha 36: Cor azul clara -->
        }
        <!-- Linha 37: Fecha o estilo do h1 -->

        .subtitle {
            <!-- Linha 38: Estiliza a classe subtitle -->
            text-align: center;
            <!-- Linha 39: Centraliza o texto -->
            color: #94a3b8;
            <!-- Linha 40: Cor cinza claro -->
            margin-bottom: 35px;
            <!-- Linha 41: Margem inferior -->
            font-size: 1.05rem;
            <!-- Linha 42: Tamanho da fonte -->
        }
        <!-- Linha 43: Fecha o estilo do subtitle -->

        .form-group {
            <!-- Linha 44: Estiliza a classe form-group -->
            margin-bottom: 22px;
            <!-- Linha 45: Espaçamento entre campos -->
        }
        <!-- Linha 46: Fecha o estilo do form-group -->

        label {
            <!-- Linha 47: Estiliza as labels -->
            display: block;
            <!-- Linha 48: Exibe como bloco -->
            margin-bottom: 8px;
            <!-- Linha 49: Margem inferior -->
            font-weight: 600;
            <!-- Linha 50: Texto em negrito -->
            color: #cbd5e1;
            <!-- Linha 51: Cor do texto -->
        }
        <!-- Linha 52: Fecha o estilo das labels -->

        input {
            <!-- Linha 53: Estiliza os campos input -->
            width: 100%;
            <!-- Linha 54: Largura total -->
            padding: 14px 16px;
            <!-- Linha 55: Espaçamento interno -->
            background: #334155;
            <!-- Linha 56: Cor de fundo -->
            border: 2px solid #475569;
            <!-- Linha 57: Borda -->
            border-radius: 8px;
            <!-- Linha 58: Cantos arredondados -->
            color: white;
            <!-- Linha 59: Cor do texto -->
            font-size: 1.1rem;
            <!-- Linha 60: Tamanho da fonte -->
            transition: all 0.3s;
            <!-- Linha 61: Transição suave -->
        }
        <!-- Linha 62: Fecha o estilo dos inputs -->

        input:focus {
            <!-- Linha 63: Estilo quando o input está focado -->
            border-color: #60a5fa;
            <!-- Linha 64: Muda cor da borda -->
            outline: none;
            <!-- Linha 65: Remove outline padrão -->
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
            <!-- Linha 66: Adiciona sombra de foco -->
        }
        <!-- Linha 67: Fecha o estilo input:focus -->

        button {
            <!-- Linha 68: Estiliza o botão -->
            width: 100%;
            <!-- Linha 69: Largura total -->
            padding: 16px;
            <!-- Linha 70: Espaçamento interno -->
            margin: 30px 0 20px 0;
            <!-- Linha 71: Margens externas -->
            background: #3b82f6;
            <!-- Linha 72: Cor de fundo azul -->
            color: white;
            <!-- Linha 73: Cor do texto -->
            font-size: 1.2rem;
            <!-- Linha 74: Tamanho da fonte -->
            font-weight: 700;
            <!-- Linha 75: Negrito -->
            border: none;
            <!-- Linha 76: Sem borda -->
            border-radius: 8px;
            <!-- Linha 77: Cantos arredondados -->
            cursor: pointer;
            <!-- Linha 78: Cursor de mão -->
            transition: background 0.3s;
            <!-- Linha 79: Transição suave -->
        }
        <!-- Linha 80: Fecha o estilo do botão -->

        button:hover {
            <!-- Linha 81: Estilo quando mouse está sobre o botão -->
            background: #2563eb;
            <!-- Linha 82: Cor mais escura no hover -->
        }
        <!-- Linha 83: Fecha o estilo button:hover -->

        #resultado {
            <!-- Linha 84: Estiliza a div de resultado -->
            margin-top: 25px;
            <!-- Linha 85: Margem superior -->
            padding: 25px;
            <!-- Linha 86: Espaçamento interno -->
            border-radius: 12px;
            <!-- Linha 87: Cantos arredondados -->
            text-align: center;
            <!-- Linha 88: Centraliza o texto -->
            min-height: 160px;
            <!-- Linha 89: Altura mínima -->
            font-size: 1.15rem;
            <!-- Linha 90: Tamanho da fonte -->
            line-height: 1.6;
            <!-- Linha 91: Espaçamento entre linhas -->
        }
        <!-- Linha 92: Fecha o estilo do resultado -->

        .atencao {
            <!-- Linha 93: Estiliza a caixa de atenção -->
            background: #334155;
            <!-- Linha 94: Cor de fundo -->
            border-left: 5px solid #eab308;
            <!-- Linha 95: Borda esquerda amarela -->
            padding: 20px;
            <!-- Linha 96: Espaçamento interno -->
            margin-top: 30px;
            <!-- Linha 97: Margem superior -->
            border-radius: 8px;
            <!-- Linha 98: Cantos arredondados -->
            font-size: 0.97rem;
            <!-- Linha 99: Tamanho da fonte -->
            color: #e2e8f0;
            <!-- Linha 100: Cor do texto -->
        }
        <!-- Linha 101: Fecha o estilo da atenção -->

        /* Linha 102: Fecha o bloco completo de CSS */
    </style>
    <!-- Linha 103: Fecha a tag style -->

</head>
<!-- Linha 104: Fecha a seção head -->

<body>
    <!-- Linha 105: Abre o corpo da página -->

    <div class="container">
        <!-- Linha 106: Abre o container principal -->

        <h1>Calculadora de IMC</h1>
        <!-- Linha 107: Título principal -->

        <p class="subtitle">Avaliação Clínica e para Praticantes de Atividade Física</p>
        <!-- Linha 108: Subtítulo da página -->

        <div class="form-group">
            <!-- Linha 109: Abre grupo do campo peso -->

            <label for="peso">Peso corporal (kg)</label>
            <!-- Linha 110: Label do peso -->

            <input type="number" id="peso" step="0.1" placeholder="Exemplo: 78.5">
            <!-- Linha 111: Campo de entrada do peso -->

        </div>
        <!-- Linha 112: Fecha grupo do peso -->

        <div class="form-group">
            <!-- Linha 113: Abre grupo do campo altura -->

            <label for="altura">Altura (metros)</label>
            <!-- Linha 114: Label da altura -->

            <input type="number" id="altura" step="0.01" placeholder="Exemplo: 1.78">
            <!-- Linha 115: Campo de entrada da altura -->

        </div>
        <!-- Linha 116: Fecha grupo da altura -->

        <button onclick="calcularIMC()">Calcular IMC</button>
        <!-- Linha 117: Botão de calcular -->

        <div id="resultado"></div>
        <!-- Linha 118: Div onde aparece o resultado -->

        <div class="atencao">
            <!-- Linha 119: Abre caixa de atenção -->

            <strong>⚠️ Importante para Atletas e Treino de Força:</strong><br><br>
            <!-- Linha 120: Título da atenção -->

            O IMC é uma ferramenta de triagem e não substitui uma avaliação completa.<br>
            <!-- Linha 121: Texto 1 da atenção -->

            Indivíduos com alta massa muscular podem apresentar IMC elevado mesmo com baixa gordura corporal.
            <!-- Linha 122: Texto 2 da atenção -->

        </div>
        <!-- Linha 123: Fecha caixa de atenção -->

    </div>
    <!-- Linha 124: Fecha o container principal -->

    <script>
        <!-- Linha 125: Abre a tag script -->

        // Linha 126: Função principal de cálculo do IMC
        function calcularIMC() {
            
            // Linha 127: Captura valor do peso
            const peso = parseFloat(document.getElementById('peso').value);
            
            // Linha 128: Captura valor da altura
            const altura = parseFloat(document.getElementById('altura').value);
            
            // Linha 129: Seleciona div de resultado
            const resultadoDiv = document.getElementById('resultado');

            // Linha 130: Validação dos campos
            if (!peso || !altura || altura <= 0 || peso <= 0) {
                resultadoDiv.style.backgroundColor = '#991b1b';
                resultadoDiv.style.color = 'white';
                resultadoDiv.innerHTML = `
                    <strong>Erro:</strong> Por favor, preencha todos os campos com valores válidos.
                `;
                return;
            }

            // Linha 131: Cálculo do IMC
            const imc = (peso / (altura * altura)).toFixed(2);

            // Linha 132: Declara variáveis de resultado
            let categoria = "";
            let cor = "";
            let mensagem = "";

            // Linha 133: Classificação - Baixo peso
            if (imc < 18.5) {
                categoria = "Baixo Peso";
                cor = "#67e8f9";
                mensagem = "Seu peso está abaixo do recomendado. Recomenda-se avaliação nutricional.";
            } 
            // Linha 134: Classificação - Peso Normal
            else if (imc >= 18.5 && imc < 25) {
                categoria = "Peso Normal";
                cor = "#4ade80";
                mensagem = "Parabéns! Seu IMC está dentro da faixa considerada saudável.";
            } 
            // Linha 135: Classificação - Sobrepeso
            else if (imc >= 25 && imc < 30) {
                categoria = "Sobrepeso";
                cor = "#fbbf24";
                mensagem = "Atenção: recomenda-se acompanhamento para prevenção de riscos.";
            } 
            // Linha 136: Classificação - Obesidade
            else {
                categoria = "Obesidade";
                cor = "#f87171";
                mensagem = "É recomendada consulta médica e avaliação nutricional completa.";
            }

            // Linha 137: Exibe resultado formatado
            resultadoDiv.style.backgroundColor = '#1e2937';
            resultadoDiv.style.border = `3px solid ${cor}`;
            resultadoDiv.innerHTML = `
                <h2 style="color: ${cor}; margin-bottom: 12px;">IMC: ${imc}</h2>
                <h3 style="color: ${cor};">${categoria}</h3>
                <p style="margin-top: 18px;">${mensagem}</p>
            `;
        }

        // Linha 138: Evento de teclado (Enter)
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcularIMC();
            }
        });

        // Linha 139: Fecha o script
    </script>
    <!-- Linha 140: Fecha a tag script -->

</body>
<!-- Linha 141: Fecha a tag body -->

</html>
<!-- Linha 142: Fecha a tag html -->
